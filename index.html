<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Defense Economy Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #1F3864;
    --navy-l:  #2a4a7f;
    --gold:    #FFD700;
    --gold-d:  #c9aa00;
    --bg:      #0d1b2e;
    --surface: #152438;
    --surface2:#1c2e45;
    --border:  #2a3f5c;
    --text:    #e8edf5;
    --text-dim:#8aa0ba;
    --green:   #4ade80;
    --red:     #f87171;

    --innov:  #60a5fa;
    --prod:   #f59e0b;
    --serv:   #34d399;
    --log:    #c084fc;
  }

  html, body, #root { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 300; }

  /* ── LAYOUT ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  .header {
    background: var(--navy);
    border-bottom: 2px solid var(--gold);
    padding: 14px 32px;
    display: flex; align-items: center; gap: 20px;
  }
  .header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 1.5rem; letter-spacing: .08em;
    color: #fff; text-transform: uppercase;
  }
  .header h1 span { color: var(--gold); }
  .header-tag {
    background: var(--gold); color: var(--navy);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: .65rem; font-weight: 700; letter-spacing: .12em;
    padding: 3px 8px; text-transform: uppercase;
  }

  .tabs {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 13px 28px; cursor: pointer; font-size: .85rem; font-weight: 500;
    letter-spacing: .06em; text-transform: uppercase;
    color: var(--text-dim); border-bottom: 3px solid transparent;
    transition: all .2s;
  }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); background: var(--surface2); }

  .main { flex: 1; display: flex; flex-direction: column; padding: 24px 32px; gap: 20px; }

  /* ── CONTROLS ── */
  .controls {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    padding: 14px 20px;
  }
  .ctrl-label {
    font-family: 'Barlow Condensed', sans-serif; font-size: .72rem;
    font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim);
  }
  select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Barlow', sans-serif; font-size: .85rem;
    padding: 6px 10px; cursor: pointer; outline: none;
    transition: border-color .2s;
  }
  select:hover, select:focus { border-color: var(--gold); }

  .toggle-group { display: flex; gap: 1px; }
  .toggle-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif;
    font-size: .75rem; font-weight: 600; letter-spacing: .1em;
    padding: 6px 14px; cursor: pointer; text-transform: uppercase;
    transition: all .15s;
  }
  .toggle-btn.active { background: var(--gold); color: var(--navy); border-color: var(--gold); }
  .toggle-btn:hover:not(.active) { border-color: var(--gold); color: var(--text); }

  /* ── SCATTER ── */
  .scatter-wrap {
    background: var(--surface); border: 1px solid var(--border);
    padding: 20px; flex: 1;
  }
  .scatter-title {
    font-family: 'Barlow Condensed', sans-serif; font-size: 1rem;
    font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 16px;
  }
  .scatter-title strong { color: var(--text); }

  .tooltip-box {
    background: var(--navy); border: 1px solid var(--gold);
    padding: 10px 14px; font-size: .8rem; min-width: 200px;
  }
  .tooltip-box .t-msa { font-weight: 600; margin-bottom: 6px; font-size: .85rem; }
  .tooltip-box .t-row { display: flex; justify-content: space-between; gap: 16px; color: var(--text-dim); }
  .tooltip-box .t-row span:last-child { color: var(--text); font-weight: 500; }

  .dim-legend { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 12px; }
  .dim-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .dim-item { font-size: .78rem; color: var(--text-dim); display: flex; align-items: center; }

  /* ── MAP PLACEHOLDER ── */
  .map-notice {
    background: var(--surface); border: 1px solid var(--border);
    padding: 40px 32px; display: flex; flex-direction: column; gap: 16px;
    align-items: flex-start;
  }
  .map-notice h3 {
    font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem;
    font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--gold);
  }
  .map-notice p { font-size: .9rem; color: var(--text-dim); line-height: 1.65; max-width: 640px; }
  .map-notice code {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 1px 6px; font-size: .82rem; color: var(--gold);
  }

  .zip-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px;
    margin-top: 8px;
  }
  .zip-card {
    background: var(--surface2); border: 1px solid var(--border);
    padding: 12px 14px;
  }
  .zip-code { font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); }
  .zip-dominant { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); margin: 4px 0 8px; }
  .zip-bars { display: flex; flex-direction: column; gap: 4px; }
  .zip-bar-row { display: flex; align-items: center; gap: 6px; font-size: .72rem; }
  .zip-bar-label { width: 80px; color: var(--text-dim); truncate: ellipsis; white-space: nowrap; overflow: hidden; }
  .zip-bar-track { flex: 1; height: 5px; background: var(--border); }
  .zip-bar-fill { height: 100%; transition: width .3s; }
  .zip-bar-val { width: 38px; text-align: right; color: var(--text); }

  /* ── INFO ── */
  .info-bar {
    display: flex; gap: 24px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    padding: 12px 20px;
  }
  .info-stat { display: flex; flex-direction: column; gap: 2px; }
  .info-stat .val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--gold); }
  .info-stat .lbl { font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); }

  .note { font-size: .72rem; color: var(--text-dim); padding: 0 2px; }

  /* ── LEAFLET MAP ── */
  .philly-map { height: 560px; border: 1px solid var(--border); background: var(--bg); }

  /* Tooltip */
  .leaflet-tooltip.zip-tt {
    background: #1F3864; border: 1px solid #FFD700;
    border-radius: 0; color: #e8edf5;
    font-family: 'Barlow', sans-serif; font-size: .8rem;
    padding: 0; box-shadow: none; pointer-events: none;
  }
  .leaflet-tooltip.zip-tt::before { display: none; }
  .zt-inner { padding: 10px 14px; min-width: 200px; }
  .zt-zip   { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; color: #FFD700; margin-bottom: 2px; }
  .zt-dom   { font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .zt-meta  { font-size: .72rem; color: #8aa0ba; margin-bottom: 8px; }
  .zt-row   { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: .72rem; }
  .zt-lbl   { width: 72px; color: #8aa0ba; white-space: nowrap; }
  .zt-track { flex: 1; height: 5px; background: #2a3f5c; }
  .zt-fill  { height: 100%; }
  .zt-val   { width: 32px; text-align: right; color: #e8edf5; }

  /* Legend */
  .map-legend {
    background: #152438; border: 1px solid #2a3f5c;
    padding: 10px 14px; font-family: 'Barlow', sans-serif; font-size: .78rem; color: #e8edf5;
  }
  .ml-title  { font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .1em; color: #8aa0ba; margin-bottom: 8px; }
  .ml-item   { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .ml-swatch { width: 14px; height: 10px; display: inline-block; flex-shrink: 0; border: 1px solid rgba(255,255,255,.25); }
  .ml-note   { font-size: .68rem; color: #8aa0ba; margin-top: 8px; }

  /* Rank labels (top 10) */
  .rank-label { background: transparent !important; border: none !important; }
  .rank-label span {
    display: inline-block;
    background: rgba(13,27,46,0.88); border: 1px solid #FFD700;
    color: #FFD700; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: .7rem; letter-spacing: .06em;
    padding: 1px 5px; white-space: nowrap;
  }

  /* Tooltip orgs list */
  .zt-orgs { margin-top: 7px; border-top: 1px solid #2a3f5c; padding-top: 6px; }
  .zt-org  { font-size: .68rem; color: #8aa0ba; margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 210px; }

  /* loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 300px; font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim);
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

// ══════════════════════════════════════════════════
// DATOS: Intentar cargar desde JSON; si no, usar datos mock
// ══════════════════════════════════════════════════

const DATA_PATH = "./data/";

const ACT_COLORS = {
  Innovation: "var(--innov)",
  Production:  "var(--prod)",
  Services:    "var(--serv)",
  Logistics:   "var(--log)",
};

const DIM_OPTIONS = [
  { value: "innovation", label: "Innovation",  color: "var(--innov)" },
  { value: "production",  label: "Production",  color: "var(--prod)"  },
  { value: "services",    label: "Services",    color: "var(--serv)"  },
  { value: "logistics",   label: "Logistics",   color: "var(--log)"   },
];

const SCORE_FIELD  = d => `${d}_score`;
const RANK_FIELD   = d => `${d}_rank`;
const ASSETS_FIELD = d => `${d}_assets`;
const AMT_FIELD    = d => `${d}_amt`;

// ── MOCK DATA (visible cuando no hay JSON cargado) ──────────
function generateMock() {
  const cities = [
    "San Diego, CA","Los Angeles, CA","New York, NY","Boston, MA",
    "Philadelphia, PA","Washington, DC","Seattle, WA","Houston, TX",
    "Dallas, TX","Chicago, IL","Atlanta, GA","Denver, CO",
    "Phoenix, AZ","San Jose, CA","Orlando, FL","Baltimore, MD",
    "Tampa, FL","Detroit, MI","Minneapolis, MN","St. Louis, MO",
    "Norfolk, VA","Huntsville, AL","San Antonio, TX","Sacramento, CA",
    "Raleigh, NC","Jacksonville, FL","Louisville, KY","Indianapolis, IN",
    "Columbus, OH","Kansas City, MO","Hartford, CT","Providence, RI",
    "Nashville, TN","New Haven, CT","Bridgeport, CT","Albuquerque, NM",
    "Oklahoma City, OK","Richmond, VA","Riverside, CA","Las Vegas, NV",
    "Portland, OR","Memphis, TN","Buffalo, NY","Pittsburgh, PA",
    "Cincinnati, OH","Cleveland, OH","Salt Lake City, UT","Milwaukee, WI",
    "Rochester, NY","Albany, NY"
  ];
  return cities.map((msa, i) => ({
    msa,
    top50: true,
    innovation_score: Math.random() * 80 + 10,
    production_score: Math.random() * 80 + 10,
    services_score:   Math.random() * 80 + 10,
    logistics_score:  Math.random() * 80 + 10,
    innovation_rank: i + 1,
    production_rank: Math.floor(Math.random() * 50) + 1,
    services_rank:   Math.floor(Math.random() * 50) + 1,
    logistics_rank:  Math.floor(Math.random() * 50) + 1,
    innovation_assets: Math.floor(Math.random() * 200 + 10),
    production_assets: Math.floor(Math.random() * 150 + 5),
    innovation_amt: Math.random() * 5000 + 200,
    production_amt: Math.random() * 8000 + 100,
    amt_total_m: Math.random() * 20000 + 500,
  }));
}

const MOCK_MAP = (() => {
  const zips = ["19101","19102","19103","19104","19106","19107","19111","19114","19115","19116",
                 "19118","19119","19120","19121","19122","19123","19124","19125","19126","19128",
                 "19130","19131","19132","19133","19134","19135","19136","19137","19138","19139",
                 "19140","19141","19143","19144","19145","19146","19147","19148","19149","19150",
                 "08101","08102","08103","08104","08105","19703","19702","19801","19802","17101"];
  const acts = ["Innovation","Production","Services","Logistics"];
  return zips.map(zip => {
    const shares = acts.map(() => Math.random());
    const total  = shares.reduce((a,b) => a+b, 0);
    const norm   = shares.map(s => s/total);
    const dom    = acts[norm.indexOf(Math.max(...norm))];
    return {
      zip_code: zip,
      total_assets: Math.floor(Math.random() * 20 + 1),
      total_amt_m:  parseFloat((Math.random() * 500).toFixed(2)),
      dominant_activity: dom,
      share_innovation: parseFloat(norm[0].toFixed(4)),
      share_production:  parseFloat(norm[1].toFixed(4)),
      share_services:    parseFloat(norm[2].toFixed(4)),
      share_logistics:   parseFloat(norm[3].toFixed(4)),
      orgs: "Sample Org A | Sample Org B | Sample Org C"
    };
  });
})();

// ══════════════════════════════════════════════════
// CUSTOM TOOLTIP — SCATTER
// ══════════════════════════════════════════════════
function ScatterTooltip({ active, payload, xDim, yDim }) {
  if (!active || !payload?.length) return null;
  const d = payload[0]?.payload;
  if (!d) return null;
  const xLabel = DIM_OPTIONS.find(o => o.value === xDim)?.label;
  const yLabel = DIM_OPTIONS.find(o => o.value === yDim)?.label;
  return (
    <div className="tooltip-box">
      <div className="t-msa">{d.msa}</div>
      <div className="t-row"><span>{xLabel} Score</span><span>{d[SCORE_FIELD(xDim)]?.toFixed(1)}</span></div>
      <div className="t-row"><span>{xLabel} Rank</span><span>#{d[RANK_FIELD(xDim)]}</span></div>
      <div className="t-row"><span>{yLabel} Score</span><span>{d[SCORE_FIELD(yDim)]?.toFixed(1)}</span></div>
      <div className="t-row"><span>{yLabel} Rank</span><span>#{d[RANK_FIELD(yDim)]}</span></div>
      <div className="t-row"><span>Total USD (M)</span><span>${d.amt_total_m?.toFixed(0)}</span></div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// MÓDULO A — SCATTER PLOT
// ══════════════════════════════════════════════════
function ScatterModule({ data }) {
  const [xDim, setXDim] = React.useState("innovation");
  const [yDim, setYDim] = React.useState("production");
  const [filter, setFilter] = React.useState("top50");

  const filtered = React.useMemo(() => {
    let d = data.filter(m =>
      m[SCORE_FIELD(xDim)] != null && m[SCORE_FIELD(yDim)] != null
    );
    if (filter === "top50") d = d.filter(m => m.top50);
    return d;
  }, [data, xDim, yDim, filter]);

  const xLabel = DIM_OPTIONS.find(o => o.value === xDim)?.label || xDim;
  const yLabel = DIM_OPTIONS.find(o => o.value === yDim)?.label || yDim;
  const xColor = DIM_OPTIONS.find(o => o.value === xDim)?.color || "#fff";
  const yColor = DIM_OPTIONS.find(o => o.value === yDim)?.color || "#fff";

  const { ScatterChart, Scatter, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Label } = Recharts;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

      {/* Controls */}
      <div className="controls">
        <span className="ctrl-label">X Axis</span>
        <select value={xDim} onChange={e => setXDim(e.target.value)}>
          {DIM_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
        <span className="ctrl-label" style={{ marginLeft: 8 }}>Y Axis</span>
        <select value={yDim} onChange={e => setYDim(e.target.value)}>
          {DIM_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 10 }}>
          <span className="ctrl-label">Filter</span>
          <div className="toggle-group">
            <button className={`toggle-btn ${filter === "top50" ? "active" : ""}`} onClick={() => setFilter("top50")}>Top 50</button>
            <button className={`toggle-btn ${filter === "all" ? "active" : ""}`} onClick={() => setFilter("all")}>All MSAs</button>
          </div>
        </div>
      </div>

      {/* Info bar */}
      <div className="info-bar">
        <div className="info-stat">
          <span className="val">{filtered.length}</span>
          <span className="lbl">MSAs shown</span>
        </div>
        <div className="info-stat">
          <span className="val" style={{ color: xColor }}>{xLabel}</span>
          <span className="lbl">X Axis</span>
        </div>
        <div className="info-stat">
          <span className="val" style={{ color: yColor }}>{yLabel}</span>
          <span className="lbl">Y Axis</span>
        </div>
        <div style={{ marginLeft: "auto", alignSelf: "center" }}>
          <span className="note">Score = avg(rank assets, rank USD). Lower score = higher rank.</span>
        </div>
      </div>

      {/* Chart */}
      <div className="scatter-wrap">
        <div className="scatter-title">
          <strong>{xLabel}</strong> vs <strong>{yLabel}</strong> — Defense Economy Index
        </div>
        <ResponsiveContainer width="100%" height={440}>
          <ScatterChart margin={{ top: 10, right: 30, bottom: 40, left: 30 }}>
            <CartesianGrid stroke="#2a3f5c" strokeDasharray="3 3" />
            <XAxis
              type="number" dataKey={SCORE_FIELD(xDim)}
              name={xLabel}
              tick={{ fill: "#8aa0ba", fontSize: 11 }}
              reversed
            >
              <Label value={`${xLabel} Score (lower = better)`} position="insideBottom" offset={-20}
                fill="#8aa0ba" fontSize={11} />
            </XAxis>
            <YAxis
              type="number" dataKey={SCORE_FIELD(yDim)}
              name={yLabel}
              tick={{ fill: "#8aa0ba", fontSize: 11 }}
              reversed
            >
              <Label value={`${yLabel} Score`} angle={-90} position="insideLeft" offset={10}
                fill="#8aa0ba" fontSize={11} />
            </YAxis>
            <Tooltip content={<ScatterTooltip xDim={xDim} yDim={yDim} />} />
            <Scatter
              data={filtered}
              fill={xColor}
              fillOpacity={0.75}
              r={5}
            />
          </ScatterChart>
        </ResponsiveContainer>
        <div className="dim-legend">
          {DIM_OPTIONS.map(o => (
            <div key={o.value} className="dim-item">
              <span className="dim-dot" style={{ background: o.color }} />
              {o.label}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// MÓDULO B — MAPA PHILLY (Leaflet bubble map)
// ══════════════════════════════════════════════════
const ACT_HEX = {
  Innovation: "#60a5fa",
  Production:  "#f59e0b",
  Services:    "#34d399",
  Logistics:   "#c084fc",
};

const SHARE_COLS = [
  { key: "share_innovation", label: "Innovation", color: "#60a5fa" },
  { key: "share_production",  label: "Production",  color: "#f59e0b" },
  { key: "share_services",    label: "Services",    color: "#34d399" },
  { key: "share_logistics",   label: "Logistics",   color: "#c084fc" },
];

function buildTooltipHtml(p) {
  const color = ACT_HEX[p.dominant_activity] || "#8aa0ba";
  const bars = SHARE_COLS.map(s => {
    const pct = ((p[s.key] || 0) * 100).toFixed(0);
    return `<div class="zt-row">
      <span class="zt-lbl">${s.label}</span>
      <div class="zt-track"><div class="zt-fill" style="width:${pct}%;background:${s.color}"></div></div>
      <span class="zt-val">${pct}%</span>
    </div>`;
  }).join("");
  const orgHtml = p.orgs
    ? p.orgs.split("|").map(o => o.trim()).filter(Boolean).slice(0, 4)
        .map(o => `<div class="zt-org">${o}</div>`).join("")
    : "";
  return `<div class="zt-inner">
    <div class="zt-zip">${p.zip_code}</div>
    <div class="zt-dom" style="color:${color}">▶ ${p.dominant_activity || "No Data"}</div>
    <div class="zt-meta">${p.total_assets || 0} assets · $${(p.total_amt_m || 0).toFixed(1)}M</div>
    ${bars}
    ${orgHtml ? `<div class="zt-orgs">${orgHtml}</div>` : ""}
  </div>`;
}

function MapModule({ data }) {
  const [filterAct, setFilterAct] = React.useState("all");
  const mapDivRef    = React.useRef(null);
  const leafletRef   = React.useRef(null);
  const layersRef    = React.useRef([]);   // [{ dom, layer, baseStyle }]
  const filterActRef = React.useRef("all");

  const actDist = React.useMemo(() => {
    const counts = {};
    data.forEach(z => { counts[z.dominant_activity] = (counts[z.dominant_activity] || 0) + 1; });
    return counts;
  }, [data]);

  // Keep ref in sync so Leaflet event handlers always read current filter
  React.useEffect(() => { filterActRef.current = filterAct; }, [filterAct]);

  // Init map + load GeoJSON once
  React.useEffect(() => {
    if (!mapDivRef.current || leafletRef.current) return;

    const map = L.map(mapDivRef.current, { center: [39.95, -75.16], zoom: 11 });
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com">CARTO</a>',
      maxZoom: 19,
    }).addTo(map);
    leafletRef.current = map;

    fetch("./data/geo_philly.json")
      .then(r => r.json())
      .then(geo => {
        const features = geo.features;
        const maxAmt = Math.max(...features.map(f => f.properties.total_amt_m || 0), 1);

        function calcFillOpacity(p) {
          if (!p.total_amt_m) return 0.1;
          return 0.15 + (p.total_amt_m / maxAmt) * 0.70;
        }

        // Build rank map for top 10 by USD
        const rankMap = {};
        [...features]
          .filter(f => f.properties.total_amt_m)
          .sort((a, b) => b.properties.total_amt_m - a.properties.total_amt_m)
          .slice(0, 10)
          .forEach((f, i) => { rankMap[f.properties.zip_code] = i + 1; });

        const layers = [];

        L.geoJSON(geo, {
          style: feature => {
            const p = feature.properties;
            return {
              fillColor:   ACT_HEX[p.dominant_activity] || "#2a3f5c",
              fillOpacity: calcFillOpacity(p),
              color:       "#ffffff",
              weight:      0.5,
              opacity:     0.4,
            };
          },
          onEachFeature: (feature, layer) => {
            const p  = feature.properties;
            const bo = calcFillOpacity(p);

            layer.bindTooltip(buildTooltipHtml(p), {
              sticky: true, className: "zip-tt", opacity: 1,
            });

            layer.on("mouseover", () => {
              layer.setStyle({ weight: 2, opacity: 1, fillOpacity: Math.min(bo + 0.2, 1) });
              layer.bringToFront();
            });

            layer.on("mouseout", () => {
              const active = filterActRef.current === "all" || p.dominant_activity === filterActRef.current;
              layer.setStyle({
                weight:      0.5,
                opacity:     active ? 0.4  : 0.15,
                fillOpacity: active ? bo   : 0.05,
              });
            });

            layers.push({ dom: p.dominant_activity, layer, bo });
          },
        }).addTo(map);

        layersRef.current = layers;

        // Top-10 rank labels at ZIP centroids
        features.forEach(f => {
          const p    = f.properties;
          const rank = rankMap[p.zip_code];
          if (!rank || !p.lat_center || !p.lon_center) return;
          L.marker([p.lat_center, p.lon_center], {
            icon: L.divIcon({
              className:  "rank-label",
              html:       `<span>#${rank}</span>`,
              iconSize:   [30, 18],
              iconAnchor: [15, 9],
            }),
            interactive: false,
            zIndexOffset: 1000,
          }).addTo(map);
        });

        // Legend
        const legend = L.control({ position: "bottomright" });
        legend.onAdd = () => {
          const div = L.DomUtil.create("div", "map-legend");
          div.innerHTML =
            '<div class="ml-title">Dominant Activity</div>' +
            Object.entries(ACT_HEX).map(([act, hex]) =>
              `<div class="ml-item"><span class="ml-swatch" style="background:${hex}"></span>${act}</div>`
            ).join("") +
            '<div class="ml-item"><span class="ml-swatch" style="background:#2a3f5c"></span>No Data</div>' +
            '<div class="ml-note">Fill opacity ∝ USD (M)</div>';
          return div;
        };
        legend.addTo(map);
      });

    return () => {
      map.remove();
      leafletRef.current = null;
      layersRef.current  = [];
    };
  }, []);

  // Dim/restore polygons when filter changes
  React.useEffect(() => {
    layersRef.current.forEach(({ dom, layer, bo }) => {
      const active = filterAct === "all" || dom === filterAct;
      layer.setStyle({
        fillOpacity: active ? bo   : 0.05,
        opacity:     active ? 0.4  : 0.15,
        weight:      0.5,
      });
    });
  }, [filterAct]);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

      <div className="controls">
        <span className="ctrl-label">Dominant Activity</span>
        <div className="toggle-group">
          <button className={`toggle-btn ${filterAct === "all" ? "active" : ""}`} onClick={() => setFilterAct("all")}>All</button>
          {["Innovation","Production","Services","Logistics"].map(a => (
            <button key={a}
              className={`toggle-btn ${filterAct === a ? "active" : ""}`}
              style={filterAct === a ? {} : { borderColor: ACT_HEX[a], color: ACT_HEX[a] }}
              onClick={() => setFilterAct(a)}>
              {a} {actDist[a] ? `(${actDist[a]})` : ""}
            </button>
          ))}
        </div>
      </div>

      <div className="info-bar">
        <div className="info-stat">
          <span className="val">{data.length}</span>
          <span className="lbl">ZIP Codes</span>
        </div>
        {Object.entries(actDist).map(([act, n]) => (
          <div key={act} className="info-stat">
            <span className="val" style={{ color: ACT_HEX[act] || "var(--gold)" }}>{n}</span>
            <span className="lbl">▶ {act}</span>
          </div>
        ))}
      </div>

      <div ref={mapDivRef} className="philly-map"></div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════
function App() {
  const [tab, setTab] = React.useState("scatter");
  const [scatterData, setScatterData] = React.useState(null);
  const [mapData, setMapData]         = React.useState(null);
  const [usingMock, setUsingMock]     = React.useState(false);

  React.useEffect(() => {
    // Intentar cargar scatter_index.json; fallback a mock
    fetch(`${DATA_PATH}scatter_index.json`)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(d => setScatterData(d))
      .catch(() => { setScatterData(generateMock()); setUsingMock(true); });

    // Intentar cargar map_philly.json; fallback a mock
    fetch(`${DATA_PATH}map_philly.json`)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(d => setMapData(d))
      .catch(() => { setMapData(MOCK_MAP); });
  }, []);

  if (!scatterData || !mapData) {
    return <div className="loading">Loading data…</div>;
  }

  return (
    <div className="app">
      <div className="header">
        <h1><span>Defense Economy</span> Dashboard</h1>

        {usingMock && <span className="header-tag" style={{ background: "var(--surface2)", color: "var(--gold)", border: "1px solid var(--gold)" }}>Mock Data</span>}
      </div>

      <div className="tabs">
        <div className={`tab ${tab === "scatter" ? "active" : ""}`} onClick={() => setTab("scatter")}>
          Innovation–Production Index
        </div>
        <div className={`tab ${tab === "map" ? "active" : ""}`} onClick={() => setTab("map")}>
          ZIP Activity Map · Philadelphia
        </div>
      </div>

      <div className="main">
        {tab === "scatter" && <ScatterModule data={scatterData} />}
        {tab === "map"     && <MapModule     data={mapData}     />}
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: 40, color: "#f87171", fontFamily: "monospace", background: "#0d1b2e", minHeight: "100vh" }}>
          <div style={{ color: "#FFD700", fontSize: "1.1rem", marginBottom: 12 }}>Dashboard error</div>
          <pre style={{ whiteSpace: "pre-wrap", fontSize: ".85rem" }}>{String(this.state.error)}</pre>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
